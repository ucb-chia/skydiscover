
# General settings
max_iterations: 100
# NOTE: evolve search checkpoint interval = 1, evolve program checkpoint interval = 10
checkpoint_interval: 1
log_level: "INFO"

llm:
  models:
    - name: "gpt-5"
      weight: 1.0
  api_base: "https://api.openai.com/v1"
  api_key: ${OPENAI_API_KEY}
  temperature: 0.7
  # top_p: 0.95  # omitted by default; some providers (e.g. Anthropic) reject both temperature and top_p
  max_tokens: 32000
  timeout: 600
  guide_models:
    - name: "gpt-5-mini"
      max_tokens: 8000
      timeout: 300

search:
  type: "evox_meta"
  num_context_programs: 2

# Prompt configuration
prompt:
  template: "evox"
  system_message: evox_search_sys_prompt.txt

# Evaluator configuration
evaluator:
  timeout: 3600
  max_retries: 3
  cascade_evaluation: false

# Generation settings
diff_based_generation: false
max_solution_length: 60000
