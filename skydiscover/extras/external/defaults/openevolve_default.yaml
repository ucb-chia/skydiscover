# Tuned defaults for the OpenEvolve backend.
# Applied when no user config (-c) overrides these values.
# Model name and iterations come from CLI (--model, -i).

checkpoint_interval: 10

llm:
  temperature: 0.7
  # top_p: 0.95  # omitted by default; some providers (e.g. Anthropic) reject both temperature and top_p
  # gpt-4o/gpt-4o-mini cap at 16384 output tokens; gpt-5 models support more.
  # 16384 is the safe ceiling that works across all current OpenAI models.
  max_tokens: 16384
  timeout: 600

database:
  population_size: 40
  num_islands: 5
  migration_interval: 40
  feature_dimensions:
    - "score"
    - "complexity"

evaluator:
  timeout: 360
  max_retries: 3
  cascade_evaluation: false
  parallel_evaluations: 4

prompt:
  num_top_programs: 3
  num_diverse_programs: 2
